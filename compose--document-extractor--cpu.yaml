x-common: &common
  networks: [network]
  restart: "no"
  volumes: ["./data:/mnt/data"]
  environment:
    TZ: Europe/Moscow
    ENV_FILE: /mnt/data/.env
networks: {network: {driver: bridge, name: "network-maestro-core"}}

services:
  document-extractor:
    build: {context: ./service--document-extractor, args: {EXTRA: cpu}}
    image: maestro-core--document-extractor
    ports: ['9671:9671']
    <<: *common
